<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | RunSpace</title>
    <style>
        :root { 
            --primary: #00ff41; 
            --bg: #0a0a0a; 
            --surface: #1a1a1a; 
            --error: #ff5f56;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }

        .login-card {
            background: var(--surface); 
            padding: 40px; 
            border-radius: 15px;
            width: 100%; 
            max-width: 360px; 
            border: 1px solid #333; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { 
            width: 50px; 
            fill: var(--primary); 
            margin-bottom: 10px; 
        }

        h2 { 
            margin-bottom: 10px; 
            letter-spacing: -1px; 
            font-size: 24px;
        }

        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            margin-left: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%; 
            padding: 12px 15px; 
            background: #000;
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            background: var(--primary);
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s;
            font-size: 16px;
            color: #000;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 65, 0.2);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        .back-link { 
            display: block; 
            margin-top: 25px; 
            color: #666; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        #msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <svg class="logo" viewBox="0 0 24 24">
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/>
        </svg>
        <h2>Välkommen tillbaka</h2>
        <p class="subtitle">Logga in på ditt RunSpace-konto</p>

        <div class="input-group">
            <label>Användarnamn</label>
            <input type="text" id="username" placeholder="t.ex. admin" autofocus>
        </div>

        <div class="input-group">
            <label>Lösenord</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="login()" id="loginBtn">Logga in</button>
        
        <div id="msg"></div>

        <a href="index.html" class="back-link">← Tillbaka till terminalen</a>
    </div>

    <script>
        // Gör så att man kan trycka på "Enter" för att logga in
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        async function login() {
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            const username = userField.value.trim();
            const password = passField.value;

            if (!username || !password) {
                msg.style.color = "var(--error)";
                msg.innerText = "Vänligen fyll i alla fält.";
                return;
            }

            // UI-feedback
            btn.disabled = true;
            btn.innerText = "Verifierar...";
            msg.innerText = "";

            try {
                const response = await fetch('https://api.runspace.cloud/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username: username, Password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    msg.style.color = "var(--primary)";
                    msg.innerText = "Inloggning lyckades! Skickar dig vidare...";
                    
                    // Spara användarnamnet i localStorage (session-hantering)
                    localStorage.setItem('runspace_user', data.username);
                    
                    // Skicka tillbaks till terminalen
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                } else {
                    msg.style.color = "var(--error)";
                    msg.innerText = data.error || "Fel användarnamn eller lösenord.";
                    btn.disabled = false;
                    btn.innerText = "Logga in";
                }
            } catch (err) {
                msg.style.color = "var(--error)";
                msg.innerText = "Kunde inte ansluta till servern.";
                btn.disabled = false;
                btn.innerText = "Logga in";
            }
        }
    </script>
  <script src="/terminal.js"></script>
</body>
</html>
