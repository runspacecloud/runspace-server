<!DOCTYPE html>
<html lang="sv">
<head>
  <script src="../theme.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#060a12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>RunSpace / Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060a12;
      --bg1:      #0a0f1a;
      --bg2:      #0e1525;
      --bg3:      #141d30;
      --border:   rgba(255,255,255,.07);
      --border2:  rgba(255,255,255,.12);
      --text:     #eef2f8;
      --text2:    #8e9bb0;
      --text3:    #4e5d72;
      --accent:   #4f9cf9;
      --accent2:  #7b5cf6;
      --green:    #22d47e;
      --red:      #f04f4f;
      --sidebar-w: 220px;
      --player-h: 80px;
      --topbar-h: 52px;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; color: inherit; }
    button { cursor: pointer; }

    /* ── APP SHELL ── */
    .app {
      height: 100%;
      display: grid;
      grid-template-rows: var(--topbar-h) 1fr var(--player-h);
    }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--topbar-h);
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 0 14px 0 0;
      border-bottom: 1px solid var(--border);
      background: rgba(6,10,18,.9);
      backdrop-filter: blur(24px);
    }

    .brand {
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .brand-icon {
      width: 30px; height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #4f9cf9, #7b5cf6);
      display: grid; place-items: center;
      flex: 0 0 auto;
    }

    .brand-icon svg { width: 16px; height: 16px; }

    .brand-sep { color: var(--text3); font-weight: 400; }
    .brand-page { color: var(--text2); font-weight: 500; }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 15px;
      pointer-events: none;
    }

    #global-search {
      width: 100%;
      max-width: 480px;
      height: 36px;
      padding: 0 14px 0 34px;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #global-search::placeholder { color: var(--text3); }
    #global-search:focus {
      border-color: rgba(79,156,249,.5);
      box-shadow: 0 0 0 3px rgba(79,156,249,.1);
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      background: var(--bg2);
      border-radius: 9px;
      display: grid; place-items: center;
      color: var(--text2);
      font-size: 16px;
      transition: background .15s, color .15s;
    }

    .top-btn:hover { background: var(--bg3); color: var(--text); }

    /* ── MAIN LAYOUT ── */
    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--bg1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px 10px 6px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 6px;
      margin-bottom: 4px;
    }

    .nav-item {
      height: 33px;
      padding: 0 8px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: background .14s, color .14s;
    }

    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active {
      background: rgba(79,156,249,.12);
      color: var(--accent);
    }

    .nav-item-inner { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .nav-item-icon { font-size: 15px; flex: 0 0 auto; }
    .nav-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-item-count { color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; }

    .sidebar-playlists {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg3) transparent;
    }

    .sidebar-bottom {
      padding: 10px;
      border-top: 1px solid var(--border);
    }

    .btn-create {
      width: 100%;
      height: 34px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #4f9cf9, #7b5cf6);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity .15s, transform .1s;
    }

    .btn-create:hover { opacity: .88; transform: translateY(-1px); }
    .btn-create:active { transform: translateY(0); }

    /* ── CONTENT ── */
    .content {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg3) transparent;
    }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 20px; }

    .page-greeting {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
      margin-bottom: 2px;
    }

    .page-greeting span { color: var(--accent); }

    .page-sub {
      color: var(--text3);
      font-size: 13px;
    }

    /* ── ROWS ── */
    .row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .row-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .row-arrows { display: flex; gap: 4px; }

    .row-arrow {
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      color: var(--text3);
      display: grid; place-items: center;
      font-size: 14px;
      transition: background .14s, color .14s;
    }

    .row-arrow:hover { background: var(--bg3); color: var(--text); }

    .card-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      margin-bottom: 22px;
    }

    .card-row::-webkit-scrollbar { display: none; }

    /* ── MUSIC CARDS ── */
    .music-card {
      width: 120px;
      min-width: 120px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      border-radius: 10px;
      padding: 6px;
      transition: background .15s;
    }

    .music-card:hover { background: var(--bg2); }

    .card-art {
      width: 108px; height: 108px;
      border-radius: 8px;
      background: var(--bg3);
      display: grid; place-items: center;
      overflow: hidden;
      margin-bottom: 7px;
      position: relative;
      flex: 0 0 auto;
    }

    .card-art img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .card-art-icon { font-size: 28px; color: var(--text3); }

    .card-art-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: grid; place-items: center;
      opacity: 0;
      transition: opacity .15s;
      border-radius: 8px;
    }

    .music-card:hover .card-art-overlay { opacity: 1; }

    .card-art-overlay-icon {
      width: 36px; height: 36px;
      background: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 14px;
      color: #000;
    }

    .card-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-card {
      height: 120px;
      min-width: 260px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      color: var(--text3);
      font-size: 12px;
    }

    /* ── TRACK TABLE ── */
    .playlist-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(10,15,25,.5);
    }

    .playlist-head {
      height: 46px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .playlist-head-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .playlist-name-text {
      font-weight: 700;
      font-size: 13px;
    }

    .track-count {
      font-size: 12px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    .playlist-head-btns {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .playlist-head-btn {
      height: 29px;
      padding: 0 11px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 7px;
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      transition: background .14s, color .14s;
    }

    .playlist-head-btn:hover { background: var(--bg3); color: var(--text); }

    .icon-btn {
      width: 29px; height: 29px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 7px;
      color: var(--text2);
      display: grid; place-items: center;
      font-size: 15px;
      transition: background .14s, color .14s;
    }

    .icon-btn:hover { background: var(--bg3); color: var(--text); }

    .table-wrap {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bg3) transparent;
    }

    .track-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .track-table thead th {
      height: 30px;
      padding: 0 12px;
      color: var(--text3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
      text-align: left;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg1);
    }

    .track-table tbody tr {
      height: 46px;
      cursor: pointer;
      transition: background .12s;
    }

    .track-table tbody tr:hover { background: rgba(255,255,255,.04); }
    .track-table tbody tr.playing { background: rgba(79,156,249,.08); }

    .track-table td {
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .td-num {
      width: 42px;
      text-align: center;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .playing .td-num .num { display: none; }
    .playing .td-num::after { content: "▶"; color: var(--accent); font-size: 11px; }

    .td-title { color: var(--text); }

    .title-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-thumb {
      width: 34px; height: 34px;
      border-radius: 6px;
      overflow: hidden;
      flex: 0 0 auto;
      background: var(--bg3);
      display: grid; place-items: center;
      font-size: 13px;
      color: var(--text3);
    }

    .title-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .title-info { min-width: 0; }
    .title-main {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-top: 2px;
    }

    .source-pill.yt { background: rgba(239,68,68,.15); color: #f87171; }
    .source-pill.sp { background: rgba(34,212,126,.15); color: #22d47e; }
    .source-pill.lo { background: rgba(79,156,249,.15); color: #4f9cf9; }

    .td-dur {
      width: 70px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .td-more { width: 42px; text-align: center; }

    .more-btn {
      border: 0;
      background: transparent;
      color: var(--text3);
      font-size: 18px;
      width: 28px; height: 28px;
      border-radius: 6px;
      display: inline-grid; place-items: center;
      transition: background .14s, color .14s;
    }

    .more-btn:hover { background: var(--bg3); color: var(--text); }

    .table-empty {
      text-align: center;
      height: 120px;
      color: var(--text3) !important;
      white-space: normal !important;
    }

    /* ── PLAYER ── */
    .player {
      height: var(--player-h);
      display: grid;
      grid-template-columns: 280px 1fr 240px;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      border-top: 1px solid var(--border);
      background: rgba(6,10,18,.96);
      backdrop-filter: blur(24px);
    }

    .now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .now-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: var(--bg3);
      flex: 0 0 auto;
      display: grid; place-items: center;
      overflow: hidden;
      color: var(--text3);
      font-size: 18px;
    }

    .now-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .now-info { min-width: 0; }

    .now-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .now-artist {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .now-heart {
      width: 28px; height: 28px;
      border: 0;
      background: transparent;
      color: var(--text3);
      font-size: 16px;
      border-radius: 6px;
      display: grid; place-items: center;
      transition: color .14s;
      flex: 0 0 auto;
    }

    .now-heart:hover { color: #f04f4f; }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .ctrl-btns {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      width: 32px; height: 32px;
      border: 0;
      background: transparent;
      color: var(--text2);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 16px;
      transition: background .14s, color .14s, transform .1s;
    }

    .ctrl-btn:hover { background: var(--bg2); color: var(--text); }

    .ctrl-play {
      width: 40px; height: 40px;
      background: white;
      color: #000;
      border-radius: 50%;
      font-size: 16px;
      border: 0;
      display: grid; place-items: center;
      transition: transform .12s, background .14s;
    }

    .ctrl-play:hover { transform: scale(1.06); background: #e2e8f0; }
    .ctrl-play:active { transform: scale(.96); }

    .progress-row {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      align-items: center;
      gap: 7px;
      width: min(700px, 100%);
    }

    .time-label {
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      text-align: right;
    }

    .time-label:last-child { text-align: left; }

    .progress-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: inherit;
      pointer-events: none;
    }

    /* Right tools */
    .player-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .vol-icon { color: var(--text3); font-size: 14px; }

    #vol-slider {
      width: 80px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── SETTINGS MENU ── */
    .settings-menu {
      position: fixed;
      z-index: 9999;
      width: 220px;
      display: none;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 11px;
      padding: 6px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    .settings-menu.open { display: block; }

    .settings-menu-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text2);
      text-align: left;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .14s, color .14s;
    }

    .settings-menu-item:hover { background: var(--bg3); color: var(--text); }
    .settings-menu-sep { height: 1px; background: var(--border); margin: 4px 2px; }

    /* ── NOTIFICATIONS ── */
    .toast-container {
      position: fixed;
      bottom: calc(var(--player-h) + 12px);
      right: 14px;
      z-index: 8888;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toast-in .25s ease;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .toast-icon { font-size: 15px; }

    /* ── SCROLLBARS ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 99px; }

    /* ── MOBILE ── */
    @media (max-width: 860px) {
      :root { --sidebar-w: 0px; --topbar-h: 52px; --player-h: 120px; }
      .sidebar { display: none; }
      .main { grid-template-columns: 1fr; }
      .player { grid-template-columns: 1fr; gap: 4px; padding: 8px 12px; }
      .player-right { justify-content: center; }
      .now-playing { display: none; }
      .topbar { grid-template-columns: auto 1fr auto; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 5h6v9a3 3 0 1 1-3-3h.5V5H9z" fill="white" opacity=".9"/>
        </svg>
      </span>
      <span>RunSpace</span>
      <span class="brand-sep">/</span>
      <span class="brand-page">Music</span>
    </a>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="global-search" type="text" autocomplete="off"
        placeholder="Paste a YouTube or Spotify link and press Enter…">
    </div>

    <div class="top-right">
      <button class="top-btn" id="btn-add-track" title="Add track">+</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Library</div>
        <div class="nav-item">
          <div class="nav-item-inner">
            <span class="nav-item-icon">♥</span>
            <span class="nav-item-name">Liked Songs</span>
          </div>
        </div>
        <div class="nav-item">
          <div class="nav-item-inner">
            <span class="nav-item-icon">◆</span>
            <span class="nav-item-name">Local Files</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <div class="sidebar-label">Playlists</div>
        <ul class="sidebar-playlists" id="playlist-list" style="list-style:none; flex:1; overflow-y:auto;"></ul>
      </div>

      <div class="sidebar-bottom">
        <button class="btn-create" id="btn-create-playlist" type="button">
          <span style="font-size:16px;">+</span> New Playlist
        </button>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <div class="scroll-area">
        <div class="page-header">
          <h1 class="page-greeting" id="greeting">Good evening <span id="username-span"></span></h1>
          <p class="page-sub">What do you want to listen to?</p>
        </div>

        <!-- Recently Played -->
        <div class="row-head">
          <span class="row-title">Recently Played</span>
          <div class="row-arrows">
            <button class="row-arrow" id="recent-prev">‹</button>
            <button class="row-arrow" id="recent-next">›</button>
          </div>
        </div>
        <div class="card-row" id="recent-row"></div>

        <!-- Playlist -->
        <div class="playlist-panel">
          <div class="playlist-head">
            <div class="playlist-head-left">
              <span class="playlist-name-text" id="active-playlist-name">Main Playlist</span>
              <span class="track-count" id="playlist-count">0 tracks</span>
            </div>
            <div class="playlist-head-btns">
              <button class="playlist-head-btn" id="btn-add-url">Add URL</button>
              <button class="icon-btn" id="playlist-menu" title="Playlist options">•••</button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="track-table" id="track-table">
              <thead>
                <tr>
                  <th class="td-num">#</th>
                  <th>Title</th>
                  <th style="width:22%;">Artist</th>
                  <th class="td-dur">Time</th>
                  <th class="td-more"></th>
                </tr>
              </thead>
              <tbody id="track-tbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- PLAYER -->
  <footer class="player">
    <!-- Now playing -->
    <div class="now-playing">
      <div class="now-thumb" id="now-thumb">♪</div>
      <div class="now-info">
        <div class="now-title" id="now-title">No track loaded</div>
        <div class="now-artist" id="now-artist">—</div>
      </div>
      <button class="now-heart" title="Like">♡</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" id="btn-prev" title="Previous">⏮</button>
        <button class="ctrl-play" id="btn-play" title="Play/Pause">▶</button>
        <button class="ctrl-btn" id="btn-next" title="Next">⏭</button>
      </div>
      <div class="progress-row">
        <span class="time-label" id="time-cur">0:00</span>
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>

    <!-- Right tools -->
    <div class="player-right">
      <span class="vol-icon">🔊</span>
      <input id="vol-slider" type="range" min="0" max="100" value="80" title="Volume">
    </div>
  </footer>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<!-- Settings menu -->
<div class="settings-menu" id="settings-menu">
  <button class="settings-menu-item" data-action="rename">✏️ Rename playlist</button>
  <button class="settings-menu-item" data-action="username">👤 Change display name</button>
  <div class="settings-menu-sep"></div>
  <button class="settings-menu-item" data-action="clear-recent">🗑 Clear recently played</button>
</div>

<!-- Hidden players -->
<div id="yt-player" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;"></div>
<div id="sp-player" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

<script src="script.js?v=12" defer></script>
<script src="/pwa.js" defer></script>
</body>
</html>
