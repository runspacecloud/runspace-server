<!DOCTYPE html>
<html lang="en">
<head>
<script src="/theme.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sponsors — RunSpace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080812;--bg-2:#0d0d1a;--bg-3:#111125;--surface:#0b0b14;--surface-2:#0f0f1a;--text:#e8e8f0;--text-2:#8888a8;--muted:#4e617a;--border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.11);--accent:#3b7dff;--accent-glow:rgba(59,125,255,.18);--radius:12px;--font-body:'DM Sans',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}
a{color:inherit;text-decoration:none}
.shell{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:2px;background:var(--bg)}
.logo{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:12px;font-weight:800;font-size:15px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.side-group{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:16px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:rgba(59,125,255,.12);color:var(--accent)}
.main{padding:48px 56px;max-width:900px}
.page-header{margin-bottom:40px}
.page-eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}
.page-title{font-size:36px;font-weight:800;line-height:1.1;margin-bottom:12px}
.page-sub{font-size:15px;color:var(--text-2);line-height:1.6;max-width:520px}
.sponsors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:32px}
.sponsor-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:14px;transition:border-color .2s,transform .2s}
.sponsor-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.sponsor-logo{width:56px;height:56px;border-radius:10px;object-fit:contain;background:var(--bg-3);padding:6px}
.sponsor-logo-placeholder{width:56px;height:56px;border-radius:10px;background:var(--accent);display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.sponsor-name{font-size:16px;font-weight:700}
.sponsor-desc{font-size:13px;color:var(--text-2);line-height:1.5}
.sponsor-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.sponsor-link{font-size:12px;color:var(--accent);font-family:var(--font-mono);padding:4px 10px;border:1px solid rgba(59,125,255,.2);border-radius:6px;transition:background .15s}
.sponsor-link:hover{background:rgba(59,125,255,.08)}
.empty{color:var(--muted);font-size:14px;margin-top:32px}
.rs-star-canvas{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.rs-star-dot{position:absolute;border-radius:50%;animation:rsFall linear infinite}
@keyframes rsFall{from{transform:translateY(-10px);opacity:0}5%{opacity:1}95%{opacity:1}to{transform:translateY(100vh);opacity:0}}
</style>
</head>
<body>
<div class="rs-star-canvas" id="stars"></div>
<div class="shell">
  <aside class="side">
    <div class="logo"><div class="logo-icon">R</div>RunSpace</div>
    <div class="side-group">Platform</div>
    <a href="/" class="nav-item">Home</a>
    <a href="/about" class="nav-item">About</a>
    <a href="/download" class="nav-item">Download</a>
    <a href="/news" class="nav-item">News</a>
    <div class="side-group">Legal</div>
    <a href="/tos" class="nav-item">Terms</a>
    <a href="/privacy" class="nav-item">Privacy</a>
    <div class="side-group">Support</div>
    <a href="/sponsors" class="nav-item active">Sponsors</a>
  </aside>
  <main class="main" style="position:relative;z-index:1">
    <div class="page-header">
      <div class="page-eyebrow">Community</div>
      <h1 class="page-title">Sponsors</h1>
      <p class="page-sub">People and organizations that support RunSpace's development and mission.</p>
    </div>
    <div class="sponsors-grid" id="sponsorsGrid">
      <p class="empty">Loading...</p>
    </div>
  </main>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Stars
  var c = document.getElementById('stars');
  for (var i = 0; i < 150; i++) {
    var s = document.createElement('div');
    s.className = 'rs-star-dot';
    var sz = (Math.random()*1.8+0.4).toFixed(2);
    var dur = (Math.random()*12+8).toFixed(1);
    var delay = (Math.random()*-20).toFixed(1);
    var op = (Math.random()*0.5+0.4).toFixed(2);
    s.style.cssText = 'left:'+(Math.random()*100).toFixed(2)+'%;top:0;width:'+sz+'px;height:'+sz+'px;background:rgba(255,255,255,'+op+');animation-duration:'+dur+'s;animation-delay:'+delay+'s';
    c.appendChild(s);
  }
  // Load sponsors
  fetch('/api/sponsors', {credentials:'include'})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var grid = document.getElementById('sponsorsGrid');
      if (!data || !data.length) {
        grid.innerHTML = '<p class="empty">No sponsors yet.</p>';
        return;
      }
      grid.innerHTML = data.map(function(sp) {
        var logo = sp.logoPath
          ? '<img class="sponsor-logo" src="'+sp.logoPath+'" alt="'+sp.name+'">'
          : '<div class="sponsor-logo-placeholder">'+sp.name.charAt(0)+'</div>';
        var desc = sp.descriptionEn || sp.description || '';
        var links = '';
        if (sp.url) links += '<a href="'+sp.url+'" target="_blank" class="sponsor-link">Website</a>';
        if (sp.links) {
          try {
            var extra = JSON.parse(sp.links);
            extra.forEach(function(item) {
              links += '<a href="'+item.url+'" target="_blank" class="sponsor-link">'+item.platform+'</a>';
            });
          } catch(e) {}
        }
        return '<div class="sponsor-card">'+logo+'<div class="sponsor-name">'+sp.name+'</div>'+(desc?'<div class="sponsor-desc">'+desc+'</div>':'')+(links?'<div class="sponsor-links">'+links+'</div>':'')+'</div>';
      }).join('');
    })
    .catch(function() {
      document.getElementById('sponsorsGrid').innerHTML = '<p class="empty">Could not load sponsors.</p>';
    });
});
</script>
</body>
</html>
