<!DOCTYPE html>
<html lang="en" style="background:#07070d">
<head><script src="../theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0a0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunSpace">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<title>Inbox · RunSpace</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/inbox/style.css">
</head>
<body>

<div class="topbar">
  <h1>
    Inbox
    <span class="unread-pill" id="unreadPill">0</span>
  </h1>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll()" aria-label="Refresh">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
  </button>
</div>

<div id="content">
  <!-- Sections injected by JS -->
</div>

<nav class="mobile-bottomnav">
  <a href="/"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></a>
  <a href="/chatt"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
  <a href="/spaces"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg><span>Spaces</span></a>
  <a href="/inbox" class="active"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><span>Inbox</span></a>
  <a href="/profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Me</span></a>
</nav>

<script src="/pwa.js" defer></script>
<script>
// ========== ICONS ==========
const ICONS = {
  support: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
  invite: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>',
  report: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  empty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
  err: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
};

// ========== TIME FORMATTER ==========
function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 604800) return Math.floor(diff/86400) + 'd';
  return d.toLocaleDateString();
}

// ========== RENDERERS ==========
function renderItem({ iconType, title, sub, time, unread, badges, onClickPath, extra }) {
  const el = document.createElement('div');
  el.className = 'item' + (unread ? ' unread' : '');
  el.onclick = () => { if (onClickPath) location.href = onClickPath; };
  el.innerHTML = `
    <div class="item-icon ${iconType}">${ICONS[iconType] || ICONS.support}</div>
    <div class="item-body">
      <div class="item-row">
        <div class="item-title"></div>
        <div class="item-time">${time || ''}</div>
      </div>
      ${sub ? `<div class="item-sub"></div>` : ''}
      ${extra || ''}
      ${badges ? `<div class="item-badges">${badges}</div>` : ''}
    </div>
    ${typeof unread === 'number' && unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
  `;
  el.querySelector('.item-title').textContent = title || '';
  if (sub) el.querySelector('.item-sub').textContent = sub;
  return el;
}

function makeSection(title, items, emptyText, totalCount) {
  const section = document.createElement('div');
  section.className = 'section';
  const head = `
    <div class="section-head">
      <div class="section-title">// ${title}</div>
      ${totalCount > 0 ? `<div class="section-count"><b>${totalCount}</b></div>` : ''}
    </div>`;
  section.innerHTML = head;
  if (items && items.length > 0) {
    items.forEach(it => section.appendChild(it));
  } else {
    const empty = document.createElement('div');
    empty.className = 'section-empty';
    empty.textContent = emptyText;
    section.appendChild(empty);
  }
  return section;
}

// ========== LOADERS ==========
async function loadMe() {
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function loadTickets() {
  try {
    const r = await fetch('/api/support/my-tickets', { credentials: 'include' });
    if (!r.ok) return [];
    const d = await r.json();
    return (d.tickets || []).map(t => {
      const badges = `
        <span class="status-tag ${t.status}">${t.status.replace(/_/g,' ')}</span>
        ${t.priority && t.priority !== 'normal' ? `<span class="prio-tag ${t.priority}">${t.priority}</span>` : ''}
      `;
      return renderItem({
        iconType: 'support',
        title: t.subject || '(no subject)',
        sub: t.category,
        time: timeAgo(t.updatedAt || t.createdAt),
        unread: t.unread || 0,
        badges,
        onClickPath: '/ticket?id=' + encodeURIComponent(t.ticketId)
      });
    });
  } catch (e) { return []; }
}

async function loadLinkRequests() {
  try {
    const r = await fetch('/api/chat/link-requests', { credentials: 'include' });
    if (!r.ok) return [];
    const d = await r.json();
    const list = Array.isArray(d) ? d : (d.requests || d.linkRequests || []);
    return list.map(req => {
      const code = req.code || req.linkCode || req.approvalCode || '';
      const device = req.deviceName || req.device || 'Unknown device';
      return renderItem({
        iconType: 'link',
        title: 'New device wants to link',
        sub: device,
        time: timeAgo(req.createdAt || req.requestedAt),
        unread: 1,
        extra: code ? `<div class="link-code">${code}</div>` : '',
        onClickPath: '/profile/settings#devices'
      });
    });
  } catch (e) { return []; }
}

async function loadGroupInvites() {
  try {
    const r = await fetch('/api/groups/invites/mine', { credentials: 'include' });
    if (!r.ok) return [];
    const d = await r.json();
    const list = Array.isArray(d) ? d : (d.invites || []);
    return list.map(inv => {
      const groupName = inv.groupName || inv.group || 'Unnamed group';
      const inviter = inv.invitedBy || inv.from || '';
      return renderItem({
        iconType: 'invite',
        title: `Invite: ${groupName}`,
        sub: inviter ? `From @${inviter}` : 'Tap to view',
        time: timeAgo(inv.createdAt),
        unread: 1,
        onClickPath: '/chatt#invites'
      });
    });
  } catch (e) { return []; }
}

async function loadReports() {
  try {
    const r = await fetch('/api/admin/reports', { credentials: 'include' });
    if (!r.ok) return [];
    const list = await r.json();
    return (Array.isArray(list) ? list : []).slice(0, 10).map(rep => {
      return renderItem({
        iconType: 'report',
        title: `@${rep.reportedUser || '?'} — ${rep.reason || 'no reason'}`,
        sub: `Reported by @${rep.reportedBy || '?'}`,
        time: timeAgo(rep.createdAt),
        unread: 0,
        onClickPath: '/cases-admin'
      });
    });
  } catch (e) { return []; }
}

// ========== MAIN ==========
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  const content = document.getElementById('content');
  content.innerHTML = '<div class="global-state">' + ICONS.empty + '<p>Loading…</p></div>';

  const me = await loadMe();
  if (!me) {
    location.href = '/login?next=/inbox';
    return;
  }
  if (!me.isAdmin) {
    location.href = '/';
    return;
  }

  const [tickets, linkReqs, invites, reports] = await Promise.all([
    loadTickets(),
    loadLinkRequests(),
    loadGroupInvites(),
    me.isAdmin ? loadReports() : Promise.resolve([])
  ]);

  content.innerHTML = '';

  const totalCount = tickets.length + linkReqs.length + invites.length;
  const unreadTotal = tickets.filter(t => t.classList.contains('unread')).length + linkReqs.length + invites.length;

  const pill = document.getElementById('unreadPill');
  if (unreadTotal > 0) { pill.textContent = unreadTotal; pill.classList.add('visible'); }
  else pill.classList.remove('visible');

  content.appendChild(makeSection('Device requests', linkReqs, 'No pending link requests', linkReqs.length));
  content.appendChild(makeSection('Group invites', invites, 'No group invites', invites.length));
  content.appendChild(makeSection('Support tickets', tickets, 'No support tickets yet', tickets.length));
  if (me.isAdmin) {
    content.appendChild(makeSection('Admin: Recent reports', reports, 'No reports', reports.length));
  }

  if (totalCount === 0 && (!me.isAdmin || reports.length === 0)) {
    content.innerHTML = `
      <div class="global-state">
        ${ICONS.empty}
        <h2>All caught up</h2>
        <p>Nothing new in your inbox. Tickets, device link requests and group invites will show up here.</p>
      </div>`;
  }

  btn.classList.remove('loading');
}

document.addEventListener('DOMContentLoaded', loadAll);
setInterval(loadAll, 60000);
</script>
</body>
</html>
