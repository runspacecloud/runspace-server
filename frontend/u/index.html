<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RunSpace Profile</title>
  <style>
    :root {
      --bg: #070912;
      --panel: rgba(11, 15, 28, .86);
      --panel2: rgba(15, 21, 38, .82);
      --line: rgba(255,255,255,.075);
      --text: rgba(240,245,255,.94);
      --muted: rgba(139,160,199,.72);
      --dim: rgba(139,160,199,.48);
      --blue: #4f7cff;
      --blue2: #74a2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(79,124,255,.12), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(116,162,255,.045), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.28) 1px, transparent 1px);
      background-size: 140px 140px;
      opacity: .18;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    a { color: inherit; text-decoration: none; }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 184px 1fr;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 184px;
      border-right: 1px solid var(--line);
      background: rgba(7, 10, 20, .78);
      backdrop-filter: blur(18px);
      padding: 22px 18px;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 42px;
      font-weight: 800;
      color: #fff;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4f7cff, #7b61ff);
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(79,124,255,.25);
    }

    .nav-label {
      margin: 24px 0 10px;
      color: var(--dim);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav a {
      color: rgba(139,160,199,.78);
      font-size: 13px;
      padding: 8px 0;
      transition: color .15s ease;
    }

    .nav a:hover { color: #fff; }

    .main {
      grid-column: 2;
      min-height: 100vh;
      padding: 48px 28px 86px;
    }

    .profile-shell {
      width: min(860px, calc(100vw - 260px));
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(8, 12, 23, .62);
      box-shadow: 0 24px 90px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .banner {
      height: 210px;
      position: relative;
      background:
        radial-gradient(circle at 24% 20%, rgba(79,124,255,.28), transparent 32%),
        linear-gradient(135deg, rgba(18,24,48,.98), rgba(11,15,32,.98));
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .identity {
      position: relative;
      padding: 0 30px 26px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: end;
      background: linear-gradient(to bottom, rgba(10,14,27,.92), rgba(8,12,23,.78));
    }

    .avatar {
      width: 92px;
      height: 92px;
      margin-top: -46px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4f7cff, #7b61ff);
      color: #fff;
      font-size: 34px;
      font-weight: 900;
      box-shadow:
        0 0 0 7px rgba(8,12,23,.98),
        0 18px 55px rgba(0,0,0,.42);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .username {
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verified {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: none;
      place-items: center;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .verified.show { display: grid; }

    .subline {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      height: 38px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: rgba(79,124,255,.40);
      background: linear-gradient(135deg, #4f7cff, #3f6df2);
      box-shadow: 0 12px 34px rgba(79,124,255,.28);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .body {
      padding: 28px 30px 32px;
      display: grid;
      gap: 22px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .tab {
      border: 0;
      border-radius: 11px;
      background: rgba(79,124,255,.13);
      color: #fff;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 12px;
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .about-card,
    .info-card,
    .badges-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.025);
      padding: 18px;
    }

    .about-text {
      margin: 0;
      color: rgba(210,222,248,.84);
      font-size: 14px;
      line-height: 1.65;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,.022);
    }

    .stat-label {
      color: var(--dim);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .stat-value {
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }

    .stat-sub {
      margin-top: 5px;
      color: var(--dim);
      font-size: 11px;
      font-weight: 750;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      border: 1px solid rgba(79,124,255,.22);
      background: rgba(79,124,255,.10);
      color: rgba(218,228,255,.92);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      color: var(--dim);
      font-size: 13px;
    }

    .footer {
      position: fixed;
      left: 184px;
      right: 0;
      bottom: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      color: var(--dim);
      font-size: 11px;
      border-top: 1px solid var(--line);
      background: rgba(7, 10, 20, .72);
      backdrop-filter: blur(14px);
    }

    .error {
      width: min(620px, calc(100vw - 240px));
      margin: 16vh auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      padding: 28px;
      text-align: center;
    }

    .error h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .error p {
      margin: 0;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .layout { display: block; }

      .sidebar {
        display: none;
      }

      .main {
        padding: 20px 14px 80px;
      }

      .profile-shell {
        width: 100%;
      }

      .banner {
        height: 150px;
      }

      .identity {
        grid-template-columns: auto 1fr;
        align-items: end;
        padding: 0 18px 22px;
      }

      .actions {
        grid-column: 1 / -1;
        width: 100%;
      }

      .actions .btn {
        flex: 1;
      }

      .body {
        padding: 22px 18px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .footer {
        left: 0;
      }
    }

<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="brand" href="/">
        <span class="logo">R</span>
        <span>RunSpace</span>
      </a>

      <div class="nav-label">Platform</div>
      <nav class="nav">
        <a href="/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.5V21h13V9.5"/><path d="M9.5 21v-6h5v6"/></svg></span><span>Home</span></a>
        <a href="/about/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 10.5v6"/><path d="M12 7.5h.01"/></svg></span><span>About</span></a>
        <a href="/download/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11"/><path d="m8 10 4 4 4-4"/><path d="M5 18.5h14"/></svg></span><span>Download</span></a>
        <a href="/news/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11.5A2.5 2.5 0 0 1 19 6.5V20H7.5A2.5 2.5 0 0 1 5 17.5z"/><path d="M8.5 8h7"/><path d="M8.5 12h7"/><path d="M8.5 16h4"/></svg></span><span>News</span></a>
      </nav>

      <div class="nav-label">Legal</div>
      <nav class="nav">
        <a href="/term-of-service/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3.5h7l3 3V20.5H7z"/><path d="M14 3.5v4h4"/><path d="M9.5 12h5"/><path d="M9.5 15.5h5"/></svg></span><span>Terms</span></a>
        <a href="/privacy/"><span class="nav-ico"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5 19 6v5.3c0 4.4-2.8 7.7-7 9.2-4.2-1.5-7-4.8-7-9.2V6z"/><path d="M9.5 12.2 11.3 14l3.4-4"/></svg></span><span>Privacy</span></a>
      </nav>
    </aside>

    <main class="main" id="app">
      <section class="profile-shell">

        <button class="profile-back" id="profileBackBtn" type="button">
          <span class="profile-back-arrow">←</span>
          <span>Back</span>
        </button>

        <div class="banner" id="banner"></div>

        <div class="identity">
          <div class="avatar" id="avatar">R</div>

          <div>
            <div class="name-row">
              <div class="username" id="username">Loading...</div>
              <div class="verified" id="verified">✓</div>
            </div>
            <div class="subline">
              <span id="handle">@user</span>
              <span id="joinedSmall">Member</span>
            </div>
          </div>

          <div class="actions">
            <a class="btn primary" id="messageBtn" href="/chatt/">Message</a>
            <button class="btn" id="copyBtn" type="button">Share</button>
          </div>
        </div>

        <div class="body">
          <div class="tabs">
            <button class="tab">Overview</button>
          </div>

          <section>
            <h3 class="section-title">About</h3>
            <div class="about-card">
              <p class="about-text" id="about">No bio yet.</p>
            </div>
          </section>

          <section>
            <h3 class="section-title">Info</h3>
            <div class="info-grid">
              <div class="stat">
                <div class="stat-label">ACCOUNT CREATED</div>
                <div class="stat-value" id="joined">Unknown</div>
              </div>
              <div class="stat">
                <div class="stat-label">Plan</div>
                <div class="stat-value" id="plan">Free</div>
              </div>
              <div class="stat">
                <div class="stat-label">Aura</div>
                <div class="stat-value" id="auraValue">Hidden</div>
                <div class="stat-sub" id="auraMeta">0 active days</div>
              </div>
              <div class="stat">
                <div class="stat-label">Public ID</div>
                <div class="stat-value" id="publicId">Hidden</div>
              </div>
            </div>
          </section>

          <section>
            <h3 class="section-title">Badges</h3>
            <div class="badges-card">
              <div class="badges" id="badges"></div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <span>RunSpace © 2026</span>
    <span>Public Profile</span>
  </footer>

  <script>
    const $ = id => document.getElementById(id);


    function setupProfileBackButton() {
      const btn = $("profileBackBtn");
      if (!btn) return;

      btn.addEventListener("click", () => {
        const ref = document.referrer || "";

        try {
          if (ref) {
            const refUrl = new URL(ref);
            if (refUrl.origin === location.origin && refUrl.href !== location.href) {
              location.href = refUrl.href;
              return;
            }
          }
        } catch {}

        if (history.length > 1) {
          history.back();
          return;
        }

        location.href = "/";
      });
    }

    function getUsernameFromPath() {
      const parts = location.pathname.split("/").filter(Boolean);
      if (parts[0] === "u" && parts[1]) return decodeURIComponent(parts[1]);
      return new URLSearchParams(location.search).get("user") || "mx403";
    }

    function initials(name) {
      return String(name || "R")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(x => x[0])
        .join("")
        .toUpperCase() || "R";
    }

    function escapeText(s) {
      return String(s ?? "");
    }

    function shortId(id) {
      if (!id) return "Hidden";
      return String(id).slice(0, 8) + "…";
    }

    function formatJoined(dateValue) {
      if (!dateValue) return "Unknown";
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return String(dateValue);

      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }


    function isDefaultRunSpaceBanner(url) {
      if (!url) return true;

      try {
        const parsed = new URL(url, location.origin);
        const path = parsed.pathname.toLowerCase();

        // Real user/custom banners should always be shown.
        if (
          path.includes("/uploads/") ||
          path.includes("/profile-banners/") ||
          path.includes("/user-banners/") ||
          path.includes("/banners/")
        ) {
          return false;
        }

        // Only known built-in/default assets should become subtle.
        return (
          path.endsWith("/default-banner.png") ||
          path.endsWith("/profile-default.png") ||
          path.endsWith("/banner-default.png") ||
          path.includes("/assets/default-banner") ||
          path.includes("/assets/profile-default") ||
          path.includes("/assets/runspace-default-banner")
        );
      } catch {
        // If parsing fails, do not hide the user's banner.
        return false;
      }
    }

    function renderBanner(url, name) {
      const banner = $("banner");
      banner.innerHTML = "";
      banner.classList.remove("rs-default-banner");

      if (isDefaultRunSpaceBanner(url)) {
        banner.classList.add("rs-default-banner");
        return;
      }

      const img = document.createElement("img");
      img.src = url;
      img.alt = "";
      banner.appendChild(img);
    }

    function normalizeBadges(data) {
      const b = data.badges || data.Badges || [];
      if (Array.isArray(b)) return b;
      if (typeof b === "string") {
        try {
          const parsed = JSON.parse(b);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return b.split(",").map(x => x.trim()).filter(Boolean);
        }
      }
      return [];
    }

    function auraScoreFrom(data) {
      const aura = data.aura || data.Aura || {};
      const raw = data.auraScore ?? data.AuraScore ?? aura.score ?? aura.Score ?? 0;
      const n = Number(raw);
      return Number.isFinite(n) ? Math.max(0, Math.min(100, n)) : 0;
    }

    function auraActiveDaysFrom(data) {
      const aura = data.aura || data.Aura || {};
      const raw = data.auraActiveDays ?? data.AuraActiveDays ?? aura.activeDays ?? aura.ActiveDays ?? 0;
      const n = Number(raw);
      return Number.isFinite(n) ? Math.max(0, Math.floor(n)) : 0;
    }

    function auraLevel(score) {
      if (score >= 90) return "Legendary";
      if (score >= 75) return "Radiant";
      if (score >= 50) return "Established";
      if (score >= 25) return "Active";
      if (score >= 10) return "New Signal";
      return "Dormant";
    }

    function auraDaysText(days) {
      return days === 1 ? "1 active day" : days + " active days";
    }

    async function loadProfile() {
      const username = getUsernameFromPath();

      $("username").textContent = username;
      $("handle").textContent = "@" + username;
      $("avatar").textContent = initials(username);
      $("messageBtn").href = "/chatt/?to=" + encodeURIComponent(username);

      try {
        const res = await fetch("/api/profile/public/" + encodeURIComponent(username), {
          credentials: "include",
          headers: { "Accept": "application/json" }
        });

        if (!res.ok) throw new Error("Profile not found");

        const data = await res.json();

        const name = data.username || data.Username || username;
        const avatarUrl = data.avatarUrl || data.AvatarUrl || "";
        const bannerUrl = data.bannerUrl || data.BannerUrl || "";
        const about = data.about || data.bio || data.description || data.About || "No bio yet.";
        const createdAt = data.createdAt || data.CreatedAt || data.memberSince || "";
        const plan = data.premiumPlan || data.plan || data.Plan || "Free";
        const publicId = data.publicId || data.PublicId || "";
        const auraScore = auraScoreFrom(data);
        const auraActiveDays = auraActiveDaysFrom(data);
        const verified = !!(data.verified || data.isVerified || data.IsVerified || normalizeBadges(data).map(x => String(x).toLowerCase()).includes("verified"));

        document.title = name + " · RunSpace";

        $("username").textContent = name;
        $("handle").textContent = "@" + name;
        $("about").textContent = about;
        $("joined").textContent = formatJoined(createdAt);
        $("joinedSmall").textContent = formatJoined(createdAt);
        $("plan").textContent = String(plan || "Free");
        $("auraValue").textContent = auraLevel(auraScore) + " · " + auraScore.toFixed(1);
        $("auraMeta").textContent = auraDaysText(auraActiveDays);
        $("publicId").textContent = shortId(publicId);

        if (verified) $("verified").classList.add("show");

        if (avatarUrl) {
          $("avatar").innerHTML = "";
          const img = document.createElement("img");
          img.src = avatarUrl;
          img.alt = name;
          $("avatar").appendChild(img);
        } else {
          $("avatar").textContent = initials(name);
        }

        renderBanner(bannerUrl, name);

        const badges = normalizeBadges(data);
        const badgesEl = $("badges");
        badgesEl.innerHTML = "";

        if (!badges.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No badges yet.";
          badgesEl.appendChild(empty);
        } else {
          for (const badge of badges) {
            const chip = document.createElement("span");
            chip.className = "badge";
            chip.textContent = String(badge).replaceAll("-", " ");
            badgesEl.appendChild(chip);
          }
        }
      } catch (err) {
        $("app").innerHTML = `
          <div class="error">
            <h1>Profile not found</h1>
            <p>This user does not exist or the profile is not public.</p>
          </div>
        `;
      }
    }

    $("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        $("copyBtn").textContent = "Copied";
        setTimeout(() => $("copyBtn").textContent = "Share", 1400);
      } catch {
        alert(location.href);
      }
    });

    setupProfileBackButton();
    loadProfile();
  </script>

</body>
</html>
